baseURL = "https://github.com/Ik301/Blog"
languageCode = "en-us"
title = "IK's Blog"
theme = "rusty-typewriter"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  description = "A professional and minimalist blog with a warm touch."
  keywords = ["Blog", "Writing", "Tech", "Poetry", "Philsophy"]
    [params.author]
        name = "Isaac Kang"
  DateFormat = "January 2, 2006"

  [params.rtwt]
    sidePane = true             
    countPageItems = 7          

    [params.rtwt.home]
      showBio = true            
      showAuthorImg = true      
      sidePaneTags = true       
      showFeatured = true     
      showRecent = true         
      hideRecentWhenFeatured = true 
      countRecent = 5          

    [params.rtwt.side.home]    
      sidePaneSticky = false
      taxonomies = ["tags", "topics"]
      countTaxonomy = 5     

    [params.rtwt.side.single]   
      sidePaneSticky = true
      showDetails = true       
      showTableOfContents = true
      showAttachments = true   
      showRelated = true
      countRelated = 5         

[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/" 
  weight = 20

[[menu.main]]
  identifier = "archives"
  name = "Archives"
  url = "/archives/"
  weight = 30

[taxonomies]
  tag = "tags"
  category = "categories"